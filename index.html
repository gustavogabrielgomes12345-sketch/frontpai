<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital PWA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/png" href="https://placehold.co/192x192/red/white?text=App">
</head>

<style>
    
    .modal.show {
        display: block !important;
        background: rgba(0, 0, 0, 0.5) !important;
        opacity: 1 !important;
    }
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
    
    const btnCarrinho = document.querySelector('[data-bs-target="#modalCarrinho"]');
    const modal = document.getElementById('modalCarrinho');
    
    if (btnCarrinho && modal) {
        btnCarrinho.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            modal.classList.add('show'); 
        });
    }

    
    document.addEventListener('click', (e) => {
        if (modal && modal.classList.contains('show')) {
            if (e.target.classList.contains('btn-close') || e.target.classList.contains('btn-secondary') || e.target === modal) {
                modal.classList.remove('show');
            }
        }
    });
});
</script>


<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger sticky-top">
        <div class="container">
            <a class="navbar-brand font-weight-bold" href="#"><i class="bi bi-egg-fried"></i> MasterDev Lanches</a>
            <button class="btn btn-outline-light position-relative" data-bs-toggle="modal" data-bs-target="#modalCarrinho">
                <i class="bi bi-cart3"></i>
                <span id="badge-carrinho" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-dark">0</span>
            </button>
        </div>
    </nav>

    <div id="carrosselDestaques" class="carousel slide my-3 container" data-bs-ride="carousel">
        <div class="carousel-inner rounded shadow-sm">
            <div class="carousel-item active">
                <img src="dev.jpg" class="d-block w-100" alt="Promoção 1">
            </div>
            <div class="carousel-item">
                <img src="https://placehold.co/800x300/darkorange/white?text=Entrega+Grátis+no+App">
            </div>
        </div>
    </div>

    <div class="container my-4 text-center" id="grupo-filtros">
        <button id="btn-todos" class="btn btn-danger me-2" onclick="filtrarCategoria('todos')">Todos</button>
        <button id="btn-lanches" class="btn btn-outline-danger me-2" onclick="filtrarCategoria('lanches')">Lanches</button>
        <button id="btn-bebidas" class="btn btn-outline-danger me-2" onclick="filtrarCategoria('bebidas')">Bebidas</button>
        <button id="btn-sobremesas" class="btn btn-outline-danger" onclick="filtrarCategoria('sobremesas')">Sobremesas</button>
    </div>

    <div class="container my-3">
        <div class="card p-3 shadow-sm">
            <h5><i class="bi bi-sliders"></i> Preferências Alimentares</h5>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="switchRestricao" onchange="filtrarRestricoes()">
                <label class="form-check-label" for="switchRestricao">Ocultar itens que **Contêm Glúten / Lactose**</label>
            </div>
        </div>
    </div>

    <main class="container my-4">
        <div class="row row-cols-1 row-cols-md-3 g-4" id="vitrine-pratos"></div>
    </main>

    <div class="modal fade" id="modalCarrinho" tabindex="-1" aria-labelledby="modalCarrinhoLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title" id="modalCarrinhoLabel"><i class="bi bi-cart3"></i> Meu Pedido</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <ul class="list-group mb-3" id="itens-carrinho"></ul>
                    <div class="d-flex justify-content-between fw-bold fs-5">
                        <span>Total:</span>
                        <span id="total-carrinho">R$ 0,00</span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Continuar Comprando</button>
                    <button type="button" class="btn btn-success" onclick="alert('Pedido simula envio com sucesso!')">Finalizar Pedido</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
